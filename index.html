<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Développeur BTS SIO</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in { animation: fadeIn 1s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.8s ease-out forwards; }
        .delay-200 { animation-delay: 200ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-600 { animation-delay: 600ms; }
        .delay-800 { animation-delay: 800ms; }
        .delay-1000 { animation-delay: 1000ms; }

        @keyframes bounce {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-10px);
            }
        }

        .animate-bounce { animation: bounce 2s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        .animate-pulse { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Lucide Icons as SVG components
        const Github = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
            </svg>
        );

        const Linkedin = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
                <rect x="2" y="9" width="4" height="12"/>
                <circle cx="4" cy="4" r="2"/>
            </svg>
        );

        const Mail = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
            </svg>
        );

        const Code = ({ size = 24, style }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <polyline points="16 18 22 12 16 6"/>
                <polyline points="8 6 2 12 8 18"/>
            </svg>
        );

        const Database = ({ size = 24, style }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <ellipse cx="12" cy="5" rx="9" ry="3"/>
                <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
            </svg>
        );

        const Globe = ({ size = 24, style }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <circle cx="12" cy="12" r="10"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
        );

        const Terminal = ({ size = 24, style }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <polyline points="4 17 10 11 4 5"/>
                <line x1="12" y1="19" x2="20" y2="19"/>
            </svg>
        );

        const Camera = ({ size = 24, style }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
            </svg>
        );

        const ChevronDown = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        );

        function Portfolio() {
            const [mousePosition, setMousePosition] = useState({ x: 0, y: 0 });
            const [scrollY, setScrollY] = useState(0);
            const [menuOpen, setMenuOpen] = useState(false);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    setMousePosition({ x: e.clientX, y: e.clientY });
                };

                const handleScroll = () => {
                    setScrollY(window.scrollY);
                };

                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('scroll', handleScroll);

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('scroll', handleScroll);
                };
            }, []);

            const skills = [
                { name: 'HTML / CSS', icon: Code, color: '#e34c26' },
                { name: 'JavaScript', icon: Terminal, color: '#f7df1e' },
                { name: 'Python', icon: Code, color: '#3776ab' },
                { name: 'Java', icon: Code, color: '#007396' },
                { name: 'SQL', icon: Database, color: '#00758f' },
                { name: 'PHP', icon: Terminal, color: '#777bb4' },
                { name: 'Sécurité', icon: Terminal, color: '#10b981' }
            ];

            const projects = [
                {
                    title: 'Site Vitrine',
                    description: 'Création d\'un site vitrine moderne et responsive pour présenter une entreprise',
                    tech: ['HTML', 'CSS', 'JavaScript'],
                    color: '#6366f1'
                },
                {
                    title: 'Formulaires Numériques',
                    description: 'Application web permettant de créer, remplir et gérer des formulaires au format numérique',
                    tech: ['HTML', 'CSS', 'JavaScript'],
                    color: '#ec4899'
                },
                {
                    title: 'App Mobile',
                    description: 'Application mobile cross-platform pour la gestion de tâches (en cours de développement)',
                    tech: ['React Native', 'Firebase'],
                    color: '#14b8a6'
                }
            ];

            const parallaxOffset = scrollY * 0.5;
            const cubeRotation = scrollY * 0.2;

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white overflow-hidden relative">

                    <div className="fixed inset-0 overflow-hidden pointer-events-none">
                        <div 
                            className="absolute w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"
                            style={{
                                left: `${mousePosition.x - 192}px`,
                                top: `${mousePosition.y - 192}px`,
                                transition: 'all 0.3s ease-out'
                            }}
                        />
                        <div className="absolute top-20 right-20 w-64 h-64 bg-blue-500/5 rounded-full blur-3xl animate-pulse" />
                        <div className="absolute bottom-20 left-20 w-96 h-96 bg-pink-500/5 rounded-full blur-3xl animate-pulse" style={{ animationDelay: '1s' }} />
                    </div>

                    {/* Navigation */}
                    <nav className="fixed top-0 left-0 right-0 z-50 backdrop-blur-xl bg-slate-950/50 border-b border-slate-800/50">
                        <div className="container mx-auto px-6 py-4">
                            <div className="flex justify-between items-center">
                                <div className="text-xl md:text-2xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                                    Simon Grateloube
                                </div>
                                {/* Desktop menu */}
                                <div className="hidden md:flex gap-6">
                                    <a href="#about" className="hover:text-purple-400 transition-all duration-300 hover:scale-110">À propos</a>
                                    <a href="#skills" className="hover:text-purple-400 transition-all duration-300 hover:scale-110">Compétences</a>
                                    <a href="#projects" className="hover:text-purple-400 transition-all duration-300 hover:scale-110">Projets</a>
                                    <a href="#cv" className="hover:text-purple-400 transition-all duration-300 hover:scale-110">CV</a>
                                </div>
                                {/* Hamburger button */}
                                <button
                                    className="md:hidden flex flex-col gap-1.5 p-2 focus:outline-none"
                                    onClick={() => setMenuOpen(!menuOpen)}
                                    aria-label="Toggle menu"
                                >
                                    <span className={`block w-6 h-0.5 bg-white transition-all duration-300 ${menuOpen ? 'rotate-45 translate-y-2' : ''}`}></span>
                                    <span className={`block w-6 h-0.5 bg-white transition-all duration-300 ${menuOpen ? 'opacity-0' : ''}`}></span>
                                    <span className={`block w-6 h-0.5 bg-white transition-all duration-300 ${menuOpen ? '-rotate-45 -translate-y-2' : ''}`}></span>
                                </button>
                            </div>
                            {/* Mobile menu */}
                            {menuOpen && (
                                <div className="md:hidden flex flex-col gap-4 pt-4 pb-2 border-t border-slate-800/50 mt-4">
                                    <a href="#about" onClick={() => setMenuOpen(false)} className="hover:text-purple-400 transition-colors duration-300 text-lg">À propos</a>
                                    <a href="#skills" onClick={() => setMenuOpen(false)} className="hover:text-purple-400 transition-colors duration-300 text-lg">Compétences</a>
                                    <a href="#projects" onClick={() => setMenuOpen(false)} className="hover:text-purple-400 transition-colors duration-300 text-lg">Projets</a>
                                    <a href="#cv" onClick={() => setMenuOpen(false)} className="hover:text-purple-400 transition-colors duration-300 text-lg">CV</a>
                                </div>
                            )}

                    {/* Hero Section */}

                            <div className="grid md:grid-cols-2 gap-8 md:gap-12 items-center">
                                {/* Left side - Text */}
                                <div className="space-y-6 md:space-y-8 text-center md:text-left" style={{ transform: `translateY(${parallaxOffset}px)` }}>
                                    <div className="space-y-3 md:space-y-4">
                                        <h2 className="text-lg md:text-xl text-purple-400 font-light tracking-widest animate-fade-in">
                                            Bonjour, je suis
                                        </h2>
                                        <h1 className="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-bold leading-tight animate-slide-up">
                                            <span className="bg-gradient-to-r from-purple-400 via-pink-400 to-blue-400 bg-clip-text text-transparent">
                                                Simon Grateloube
                                            </span>
                                        </h1>
                                        <p className="text-xl sm:text-2xl md:text-3xl text-slate-300 animate-slide-up delay-200">
                                            Développeur BTS SIO SLAM 🚀 Web &amp; Cybersécurité
                                        </p>
                                    </div>
                                    
                                    <p className="text-base md:text-xl text-slate-400 leading-relaxed animate-fade-in delay-400 max-w-xl mx-auto md:mx-0">
                                        Étudiant en BTS SIO option SLAM, passionné par le développement web, la cybersécurité et les technologies modernes. 
                                        Je construis des projets concrets et fonctionnels.
                                    </p>

                                    <div className="flex flex-wrap justify-center md:justify-start gap-3 md:gap-4 animate-fade-in delay-600">
                                        <a href="#projects" className="px-6 md:px-8 py-3 md:py-4 bg-gradient-to-r from-purple-500 to-pink-500 rounded-lg font-semibold hover:scale-105 transition-transform duration-300 hover:shadow-2xl hover:shadow-purple-500/50 text-sm md:text-base">
                                            Voir mes projets
                                        </a>
                                    </div>

                                    <div className="flex gap-6 justify-center md:justify-start animate-fade-in delay-800">
                                        <a href="https://github.com/Simon-grtl" target="_blank" rel="noopener noreferrer" className="text-slate-400 hover:text-purple-400 transition-all duration-300 hover:scale-125">
                                            <Github size={28} />
                                        </a>
                                        <a href="https://www.linkedin.com/in/simon-grateloube-b74918386/" target="_blank" rel="noopener noreferrer" className="text-slate-400 hover:text-blue-400 transition-all duration-300 hover:scale-125">
                                            <Linkedin size={28} />
                                        </a>
                                        <a href="mailto:sgrateloube@lerebours.fr" className="text-slate-400 hover:text-pink-400 transition-all duration-300 hover:scale-125">
                                            <Mail size={28} />
                                        </a>
                                    </div>
                                </div>

                                {/* Right side - 3D Cube */}
                                <div className="hidden md:flex justify-center items-center animate-fade-in delay-1000">
                                    <div 
                                        className="relative w-64 h-64"
                                        style={{
                                            transform: `perspective(1000px) rotateX(${cubeRotation}deg) rotateY(${cubeRotation}deg)`,
                                            transformStyle: 'preserve-3d',
                                            transition: 'transform 0.1s ease-out'
                                        }}
                                    >
                                        {/* 3D Cube faces */}
                                        <div className="absolute inset-0 bg-gradient-to-br from-purple-500/20 to-pink-500/20 backdrop-blur-sm border border-purple-400/30 rounded-lg"
                                             style={{ transform: 'translateZ(128px)' }}>
                                            <div className="h-full flex items-center justify-center">
                                                <Code size={64} style={{ color: '#a855f7' }} />
                                            </div>
                                        </div>
                                        <div className="absolute inset-0 bg-gradient-to-br from-blue-500/20 to-purple-500/20 backdrop-blur-sm border border-blue-400/30 rounded-lg"
                                             style={{ transform: 'translateZ(-128px) rotateY(180deg)' }}>
                                            <div className="h-full flex items-center justify-center">
                                                <Database size={64} style={{ color: '#3b82f6' }} />
                                            </div>
                                        </div>
                                        <div className="absolute inset-0 bg-gradient-to-br from-pink-500/20 to-purple-500/20 backdrop-blur-sm border border-pink-400/30 rounded-lg"
                                             style={{ transform: 'rotateY(90deg) translateZ(128px)' }}>
                                            <div className="h-full flex items-center justify-center">
                                                <Globe size={64} style={{ color: '#ec4899' }} />
                                            </div>
                                        </div>
                                        <div className="absolute inset-0 bg-gradient-to-br from-green-500/20 to-blue-500/20 backdrop-blur-sm border border-green-400/30 rounded-lg"
                                             style={{ transform: 'rotateY(-90deg) translateZ(128px)' }}>
                                            <div className="h-full flex items-center justify-center">
                                                <Terminal size={64} style={{ color: '#10b981' }} />
                                            </div>
                                        </div>
                                        <div className="absolute inset-0 bg-gradient-to-br from-yellow-500/20 to-pink-500/20 backdrop-blur-sm border border-yellow-400/30 rounded-lg"
                                             style={{ transform: 'rotateX(90deg) translateZ(128px)' }}>
                                            <div className="h-full flex items-center justify-center">
                                                <Camera size={64} style={{ color: '#eab308' }} />
                                            </div>
                                        </div>
                                        <div className="absolute inset-0 bg-gradient-to-br from-cyan-500/20 to-blue-500/20 backdrop-blur-sm border border-cyan-400/30 rounded-lg"
                                             style={{ transform: 'rotateX(-90deg) translateZ(128px)' }}>
                                            <div className="h-full flex items-center justify-center">
                                                <Code size={64} style={{ color: '#06b6d4' }} />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Scroll indicator */}
                        <div className="absolute bottom-8 left-1/2 transform -translate-x-1/2 animate-bounce">
                            <ChevronDown size={32} />
                        </div>
                    </section>

                    {/* About Section */}
                    <section id="about" className="min-h-screen flex items-center py-20 relative">
                        <div className="container mx-auto px-6 z-10">
                            <h2 className="text-3xl md:text-5xl font-bold mb-12 md:mb-16 text-center bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                                À propos de moi
                            </h2>
                            <div className="max-w-4xl mx-auto">
                                <div className="bg-slate-800/30 backdrop-blur-xl rounded-2xl p-8 md:p-12 border border-slate-700/50 hover:border-purple-500/50 transition-all duration-500 hover:shadow-2xl hover:shadow-purple-500/20 transform hover:-translate-y-2">
                                    <p className="text-base md:text-xl text-slate-300 leading-relaxed mb-6">
                                        Étudiant en BTS SIO option SLAM (Solutions Logicielles et Applications Métiers), passionné par le développement web, la cybersécurité et les technologies modernes. 
                                        Je construis des projets concrets et fonctionnels tout en développant mes compétences techniques.
                                    </p>
                                    <p className="text-base md:text-xl text-slate-300 leading-relaxed">
                                        Mon objectif est de continuer à apprendre, à créer des applications innovantes et à contribuer 
                                        à des projets qui ont un impact réel. Je suis toujours à la recherche de nouveaux défis 
                                        et d'opportunités pour grandir professionnellement.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Skills Section */}
                    <section id="skills" className="min-h-screen flex items-center py-20 relative">
                        <div className="container mx-auto px-6 z-10">
                            <h2 className="text-3xl md:text-5xl font-bold mb-12 md:mb-16 text-center bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                                Compétences
                            </h2>
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 max-w-6xl mx-auto">
                                {skills.map((skill, index) => {
                                    const Icon = skill.icon;
                                    return (
                                        <div
                                            key={skill.name}
                                            className="group bg-slate-800/30 backdrop-blur-xl rounded-2xl p-5 md:p-8 border border-slate-700/50 hover:border-purple-500/50 transition-all duration-500 hover:shadow-2xl hover:shadow-purple-500/20 transform hover:-translate-y-4 hover:scale-105 cursor-pointer"
                                            style={{
                                                animationDelay: `${index * 100}ms`,
                                                animation: 'fadeInUp 0.6s ease-out forwards'
                                            }}
                                        >
                                            <div className="flex flex-col items-center space-y-4">
                                                <div 
                                                    className="p-4 rounded-xl transition-all duration-500 group-hover:scale-110 group-hover:rotate-12"
                                                    style={{ backgroundColor: `${skill.color}20` }}
                                                >
                                                    <Icon size={32} style={{ color: skill.color }} />
                                                </div>
                                                <h3 className="text-lg font-semibold text-center">{skill.name}</h3>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </section>

                    {/* Projects Section */}
                    <section id="projects" className="min-h-screen flex items-center py-20 relative">
                        <div className="container mx-auto px-6 z-10">
                            <h2 className="text-3xl md:text-5xl font-bold mb-12 md:mb-16 text-center bg-gradient-to-r from-pink-400 to-purple-400 bg-clip-text text-transparent">
                                Mes Projets
                            </h2>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
                                {projects.map((project, index) => (
                                    <div
                                        key={project.title}
                                        className="group bg-slate-800/30 backdrop-blur-xl rounded-2xl overflow-hidden border border-slate-700/50 hover:border-purple-500/50 transition-all duration-500 hover:shadow-2xl hover:shadow-purple-500/20 transform hover:-translate-y-4 cursor-pointer"
                                        style={{
                                            animationDelay: `${index * 150}ms`,
                                            animation: 'fadeInUp 0.6s ease-out forwards'
                                        }}
                                    >
                                        <div 
                                            className="h-48 relative overflow-hidden"
                                            style={{ 
                                                background: `linear-gradient(135deg, ${project.color}40, ${project.color}10)` 
                                            }}
                                        >
                                            <div className="absolute inset-0 flex items-center justify-center transform group-hover:scale-110 transition-transform duration-500">
                                                <Code size={80} style={{ color: project.color, opacity: 0.3 }} />
                                            </div>
                                        </div>
                                        <div className="p-6 space-y-4">
                                            <h3 className="text-xl md:text-2xl font-bold">{project.title}</h3>
                                            <p className="text-slate-400">{project.description}</p>
                                            <div className="flex flex-wrap gap-2">
                                                {project.tech.map(tech => (
                                                    <span 
                                                        key={tech}
                                                        className="px-3 py-1 bg-slate-700/50 rounded-full text-sm text-purple-300 border border-purple-500/30"
                                                    >
                                                        {tech}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>



                    {/* CV Section */}
                    <section id="cv" className="py-20 relative">
                        <div className="container mx-auto px-6 z-10">
                            <h2 className="text-3xl md:text-5xl font-bold mb-12 md:mb-16 text-center bg-gradient-to-r from-blue-400 to-pink-400 bg-clip-text text-transparent">
                                Mon CV
                            </h2>
                            <div className="max-w-4xl mx-auto space-y-6">

                                {/* Expérience */}
                                <div className="bg-slate-800/30 backdrop-blur-xl rounded-2xl p-6 md:p-8 border border-slate-700/50 hover:border-purple-500/50 transition-all duration-500 hover:shadow-2xl hover:shadow-purple-500/20">
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="p-2 rounded-lg" style={{ backgroundColor: '#6366f120' }}>
                                            <Terminal size={24} style={{ color: '#6366f1' }} />
                                        </div>
                                        <h3 className="text-xl md:text-2xl font-bold text-purple-300">Expérience</h3>
                                    </div>
                                    <div className="space-y-4">
                                        {[
                                            { title: 'Formation science ouverte', org: 'NASA', desc: 'Réalisation de la formation à la science ouverte' },
                                            { title: 'MOOC Cybersécurité', org: 'ANSSI', desc: 'Réalisation du MOOC de l\'ANSSI en cybersécurité' },
                                            { title: 'Stage maintenance', org: 'SNCF', desc: 'Stage de seconde dans un site de maintenance SNCF' },
                                            { title: 'Employé de rayon', org: 'Carrefour Express', desc: 'Stage d\'une semaine en tant qu\'employé de rayon' },
